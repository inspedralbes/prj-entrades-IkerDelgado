server {
    listen 80;
    server_name tickethub.daw.inspedralbes.cat;
    index index.php index.html;
    root /var/www/public;

    # ── FRONTEND (Vite / React) ──
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── BACKEND (API, Sanctum, Health Check) ──
    location ~ ^/(api|sanctum|up|_debugbar) {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Procesamiento de PHP para el backend
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass api:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With, Accept, X-XSRF-TOKEN' always;
    }
}
